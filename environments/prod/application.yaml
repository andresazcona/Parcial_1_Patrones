apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pedido-app-prod
  namespace: argocd
  labels:
    environment: prod
    app.kubernetes.io/name: pedido-app
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/andresazcona/Parcial_1_Patrones.git
    targetRevision: HEAD
    path: charts/pedido-app
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
      # Credenciales gestionadas via Sealed Secrets / External Secrets Operator
      parameters:
        - name: db.auth.password
          value: "$argocd-pedido-prod-secrets:db-password"

  destination:
    server: https://kubernetes.default.svc
    namespace: pedido-prod

  syncPolicy:
    automated:
      prune: true       # Elimina recursos que ya no están en Git
      selfHeal: true    # Revierte cambios manuales en el clúster
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 10
