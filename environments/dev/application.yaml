apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pedido-app-dev
  namespace: argocd
  labels:
    environment: dev
    app.kubernetes.io/name: pedido-app
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/andresazcona/Parcial_1_Patrones.git
    targetRevision: HEAD
    path: charts/pedido-app
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      # El Secret pedido-db-secret se pre-crea en el namespace via kubectl
      # (ver README sección 6 – Seguridad de credenciales)
      parameters:
        - name: db.createSecret
          value: "false"

  destination:
    server: https://kubernetes.default.svc
    namespace: pedido-dev

  syncPolicy:
    automated:
      prune: true       # Elimina recursos que ya no están en Git
      selfHeal: false   # No revertir cambios manuales (evita loop en rolling updates)
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Revisión del estado de los recursos
  revisionHistoryLimit: 5
