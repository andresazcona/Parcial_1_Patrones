# ── Global ──────────────────────────────────────────────────────────────────
global:
  environment: dev

# ── PostgreSQL (imagen en ACR) ──────────────────────────────────────────────
db:
  enabled: true
  createSecret: false   # true = Helm crea el Secret; false = pre-creado via kubectl
  image:
    repository: andresazcona.azurecr.io/postgresql
    tag: "15-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    database: pedidosdb
  persistence:
    size: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── Backend ──────────────────────────────────────────────────────────────────
backend:
  enabled: true
  replicaCount: 1
  image:
    repository: ""          # Set per environment / values file
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  db:
    host: "pedido-app-db"
    port: 5432
    name: pedidosdb
    user: postgres
    existingSecret: pedido-db-secret
    secretKey: db-password
  config:
    extraEnv: {}

# ── Frontend ─────────────────────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: ""          # Set per environment / values file
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  config:
    apiUrl: "http://pedido-app-backend:8080"

# ── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  host: pedido-app.local
  tls: []
