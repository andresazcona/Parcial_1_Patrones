# ── values-prod.yaml ─────────────────────────────────────────────────────────
global:
  environment: prod

backend:
  replicaCount: 2
  image:
    repository: andresazcona.azurecr.io/pedido-backend
    tag: "latest"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  hpa:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60

frontend:
  replicaCount: 2
  image:
    repository: andresazcona.azurecr.io/pedido-frontend
    tag: "latest"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

db:
  persistence:
    size: 20Gi
  storageClass: "managed-csi"   # Azure Disk (AKS default)

ingress:
  host: pedido-prod.eastus.cloudapp.azure.com
  tls:
    - secretName: pedido-prod-tls
      hosts:
        - pedido-prod.eastus.cloudapp.azure.com
