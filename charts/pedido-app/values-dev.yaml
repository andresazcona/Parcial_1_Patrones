# ── values-dev.yaml ──────────────────────────────────────────────────────────
global:
  environment: dev

backend:
  replicaCount: 1
  image:
    repository: andresazcona.azurecr.io/pedido-backend
    tag: "latest"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    minReplicas: 1
    maxReplicas: 3

frontend:
  replicaCount: 1
  image:
    repository: andresazcona.azurecr.io/pedido-frontend
    tag: "latest"

db:
  primary:
    persistence:
      size: 2Gi

ingress:
  host: pedido-dev.eastus.cloudapp.azure.com
