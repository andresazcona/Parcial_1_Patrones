replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

db:
  host: "pedido-app-postgresql"
  port: 5432
  name: pedido_db
  user: pedido_user
  existingSecret: pedido-db-secret
  secretKey: db-password

config:
  extraEnv: {}
