{{- if .Values.db.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: pedido-db-secret
  labels:
    {{- include "pedido-app.labels" . | nindent 4 }}
type: Opaque
data:
  # Pasa la contraseña via --set db.auth.password=<valor> en helm install
  # NUNCA commitear contraseñas reales en este archivo.
  db-password: {{ required "db.auth.password is required" .Values.db.auth.password | b64enc | quote }}
  db-admin-password: {{ required "db.auth.password is required" .Values.db.auth.password | b64enc | quote }}
{{- end }}
