apiVersion: apps/v1
kind: Deployment
metadata:
  name: pedido-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pedido-frontend
  template:
    metadata:
      labels:
        app: pedido-frontend
    spec:
      containers:
        - name: pedido-frontend
          image: nikx00/pedido-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pedido-frontend
spec:
  type: NodePort
  selector:
    app: pedido-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007