apiVersion: apps/v1
kind: Deployment
metadata:
  name: pedido-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pedido-backend
  template:
    metadata:
      labels:
        app: pedido-backend
    spec:
      containers:
        - name: pedido-backend
          image: nikx00/pedido-backend:latest
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/pedidosdb
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: pedido-backend
spec:
  type: ClusterIP
  selector:
    app: pedido-backend
  ports:
    - port: 8080
      targetPort: 8080